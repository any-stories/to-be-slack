name: to-be-slack

on:
  schedule:
    - cron: '0 1,4,7,9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notification:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."

      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: 📦 Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ▶️ Run script
        continue-on-error: true
        env:
          APP_CONFIG: ${{ secrets.APP_CONFIG }}
        run: |
          python src/main.py || echo "⚠️ Script failed, continuing to commit cache.json"

      - name: ✍️ Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add .state/state.json
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore(state): update runtime state (run #${{ github.run_number }})"
            git push origin main
          else
            echo "No state changes detected, skipping commit."
          fi